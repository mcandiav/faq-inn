<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFAQ</title>
    <link rel="stylesheet" href="/styles.css?v=2.1.3" />
  </head>
  <body>
    <div id="app" class="app hidden">
      <header class="topbar">
        <div>
          <p class="badge">DFAQ</p>
          <h1 id="business-name">—</h1>
          <p class="sub" id="user-email">—</p>
        </div>
        <nav class="topnav">
          <button type="button" class="btn ghost" data-view="dashboard">FAQs</button>
          <button type="button" class="btn ghost" data-view="profile">Mi cuenta</button>
          <button type="button" class="btn ghost hidden" id="nav-admin" data-view="admin">
            Admin
          </button>
          <button type="button" class="btn ghost" id="btn-logout">Salir</button>
        </nav>
      </header>

      <main>
        <section id="view-dashboard" class="view">
          <div class="toolbar">
            <div>
              <h2>Preguntas y respuestas</h2>
              <p class="faq-count" id="faq-count"></p>
            </div>
            <div class="toolbar-actions hidden" id="faq-client-actions">
              <label class="btn ghost file-btn">
                Importar Excel
                <input
                  type="file"
                  id="faq-import-file"
                  accept=".xlsx,.xls,.csv"
                  hidden
                />
              </label>
              <button type="button" class="btn primary" id="btn-new-faq">Nueva FAQ</button>
            </div>
          </div>
          <p class="hint" id="dashboard-hint"></p>
          <label class="checkbox import-replace hidden" id="import-replace-wrap">
            <input type="checkbox" id="import-replace" />
            Reemplazar todas las FAQs al importar
          </label>
          <p class="form-msg" id="import-msg"></p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Pregunta</th>
                  <th>Respuesta</th>
                  <th>Estado</th>
                  <th>Índice</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="faq-tbody"></tbody>
            </table>
          </div>
        </section>

        <section id="view-profile" class="view hidden">
          <h2>Mi cuenta</h2>
          <form id="profile-form" class="form card-inner">
            <label>
              Email (login)
              <input type="email" id="profile-email" disabled />
            </label>
            <label>
              Nombre del negocio
              <input type="text" id="profile-business" placeholder="Ej. MorroReservas" />
            </label>
            <fieldset>
              <legend>Cambiar contraseña</legend>
              <label>
                Contraseña actual
                <input type="password" id="profile-current-password" autocomplete="current-password" />
              </label>
              <label>
                Nueva contraseña
                <input type="password" id="profile-new-password" autocomplete="new-password" />
              </label>
            </fieldset>
            <button type="submit" class="btn primary">Guardar cambios</button>
            <p class="form-msg" id="profile-msg"></p>
          </form>
        </section>

        <section id="view-admin" class="view hidden">
          <h2>Administrar posadas</h2>
          <form id="admin-tenant-form" class="form card-inner">
            <h3>Nueva posada</h3>
            <label>
              Slug técnico (para Qdrant / n8n)
              <input type="text" id="admin-slug" placeholder="morroreservas" required />
            </label>
            <label>
              Email del cliente (login)
              <input type="email" id="admin-email" placeholder="reservas@ejemplo.cl" required />
            </label>
            <label>
              Contraseña inicial
              <input type="password" id="admin-password" minlength="8" required />
            </label>
            <label>
              Slug del agente (opcional)
              <input type="text" id="admin-agent-slug" placeholder="principal" />
            </label>
            <button type="submit" class="btn primary">Crear posada</button>
            <p class="form-msg" id="admin-msg"></p>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Slug</th>
                  <th>Nombre negocio</th>
                  <th>Email cliente</th>
                  <th>Agente</th>
                </tr>
              </thead>
              <tbody id="admin-tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div id="login-screen" class="login-screen">
      <form id="login-form" class="card login-card">
        <p class="badge">DFAQ</p>
        <h1>Iniciar sesión</h1>
        <p class="lead">Administra las respuestas de tu negocio.</p>
        <label>
          Email
          <input type="email" id="login-email" required autocomplete="username" />
        </label>
        <label>
          Contraseña
          <input type="password" id="login-password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn primary block">Entrar</button>
        <p class="form-msg" id="login-msg"></p>
      </form>
    </div>

    <dialog id="faq-dialog">
      <form id="faq-form" method="dialog" class="form">
        <h3 id="faq-dialog-title">Editar FAQ</h3>
        <input type="hidden" id="faq-id" />
        <label>
          Pregunta
          <textarea id="faq-question" rows="2" required></textarea>
        </label>
        <label>
          Respuesta
          <textarea id="faq-answer" rows="4" required></textarea>
        </label>
        <label>
          Categoría
          <input type="text" id="faq-category" />
        </label>
        <label>
          Keywords
          <input type="text" id="faq-keywords" placeholder="wifi, internet, reserva" />
        </label>
        <label class="checkbox">
          <input type="checkbox" id="faq-active" checked />
          Activa
        </label>
        <div class="dialog-actions">
          <button type="button" class="btn danger hidden" id="faq-delete">Eliminar</button>
          <div class="dialog-actions-right">
            <button type="button" class="btn ghost" id="faq-cancel">Cancelar</button>
            <button type="submit" class="btn primary" id="faq-save">Guardar e indexar</button>
          </div>
        </div>
        <p class="form-msg" id="faq-msg"></p>
      </form>
    </dialog>

    <script src="/app.js?v=2.1.3"></script>
  </body>
</html>
